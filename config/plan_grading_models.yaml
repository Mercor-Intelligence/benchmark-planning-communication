# Plan grading model config — used by scripts/run_plan_grading.py with --models-config.
# Use these keys in --plan-models and --grade-model (e.g. --plan-models "claude-sonnet-4.5,bytedance-ark").
#
# Endpoints used (confirm before running):
#   1. Claude Sonnet 4.5   — Anthropic API (ANTHROPIC_API_KEY)
#   2. Claude Opus 4.5     — Anthropic API (ANTHROPIC_API_KEY)
#   3. Kimi K2 Thinking    — Fireworks or custom: set api_base to your endpoint (FIREWORKS_AI_API_KEY)
#   4. GPT-5               — OpenAI API (OPENAI_API_KEY)
#   5. Gemini 3 Pro        — Google Gemini API (GEMINI_API_KEY or GOOGLE_API_KEY)
#   6. Qwen3 32B           — Fireworks AI deployment (FIREWORKS_API_KEY)
#   7. ByteDance (ARK)     — Volcengine ARK (BYTEDANCE_API_KEY or ARK_API_KEY)

models:
  claude-sonnet-4.5:
    litellm_model: "anthropic/claude-sonnet-4-5-20250929"
    # ANTHROPIC_API_KEY

  claude-opus-4.5:
    litellm_model: "anthropic/claude-opus-4-5-20251101"
    # ANTHROPIC_API_KEY

  kimi-k2-thinking:
    litellm_model: "openai/accounts/harshvardhan-660c0e/deployments/aq0n7wsn"
    api_base: "https://api.fireworks.ai/inference/v1"
    api_key_env: "FIREWORKS_AI_API_KEY"

  gpt-5:
    litellm_model: "openai/gpt-5"
    # OPENAI_API_KEY

  gemini-3-pro:
    litellm_model: "gemini/gemini-3-pro-preview"
    # GEMINI_API_KEY or GOOGLE_API_KEY

  qwen3-32b:
    litellm_model: "openai/accounts/harshvardhan-660c0e/deployments/nahnn77u"
    api_base: "https://api.fireworks.ai/inference/v1"
    api_key_env: "FIREWORKS_API_KEY"

  bytedance-ark:
    litellm_model: "openai/ep-20260304154217-4fcst"
    api_base: "https://ark.cn-beijing.volces.com/api/v3"
    api_key_env: "BYTEDANCE_API_KEY"  # ARK_API_KEY tried as fallback
